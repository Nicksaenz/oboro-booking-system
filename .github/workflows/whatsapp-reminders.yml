name: WhatsApp appointment reminders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminders endpoint
        run: |
          curl --fail --show-error --silent \
            --request GET \
           -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
            "https://booking.oborolab.com/api/whatsapp/recordatorios-proximos"
