name: WhatsApp appointment reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Call reminders endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent --request GET -H "Authorization: Bearer $CRON_SECRET" "https://booking.oborolab.com/api/whatsapp/recordatorios-proximos"
