name: WhatsApp appointment reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    run: |
  curl --fail --show-error --silent \
    --request GET \
    -H "Authorization: Bearer $CRON_SECRET" \
    "https://booking.oborolab.com/api/whatsapp/recordatorios-proximos"
