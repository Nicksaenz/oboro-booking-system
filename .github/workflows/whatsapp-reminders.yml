name: WhatsApp appointment reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call WhatsApp reminder endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET no esta configurado en GitHub Secrets."
            echo "Crea el secret CRON_SECRET en GitHub con el mismo valor que esta en Vercel."
            exit 1
          fi

          curl --fail-with-body --show-error \
            --request GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://booking.oborolab.com/api/whatsapp/recordatorios-proximos"
